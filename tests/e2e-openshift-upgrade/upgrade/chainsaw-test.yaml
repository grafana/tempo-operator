apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: upgrade
spec:
  namespace: chainsaw-upgrade
  bindings:
  - name: upgrade_fbc_image
    value: ($values.upgrade_fbc_image)
  - name: upgrade_operator_version
    value: ($values.upgrade_operator_version)
  - name: upgrade_tempo_version
    value: ($values.upgrade_tempo_version)
  - name: upgrade_operator_csv_name
    value: ($values.upgrade_operator_csv_name)
  # Refer Chainsaw docs on how to pass data to tests.
  # https://kyverno.github.io/chainsaw/latest/examples/values/
  # Example using heredoc:
  # chainsaw test --config .chainsaw-openshift.yaml tests/e2e-openshift-upgrade --values - <<EOF
  # upgrade_fbc_image: brew.registry.redhat.io/rh-osbs/iib:1106846
  # upgrade_operator_version: 0.20.0
  # upgrade_tempo_version: 2.10.0
  # upgrade_operator_csv_name: tempo-operator.v0.20.0-1
  # EOF
  steps:
  - name: Install operators from marketplace
    try:
    - apply:
        file: 00-install-operators-from-marketplace.yaml
    - assert:
        file: 00-assert-install-operators-from-marketplace.yaml
  - name: Install storage required for TempoStack
    try:
    - apply:
        file: 01-install-storage.yaml
    - assert:
        file: 01-assert-install-storage.yaml
  - name: Install Multitenant TempoStack with RBAC
    try:
    - apply:
        file: 02-install-tempostack.yaml
    - assert:
        file: 02-assert-install-tempostack.yaml
  - name: Install Multitenant TempoMonolithic with RBAC
    try:
    - apply:
        file: 03-install-tempo-monolithic.yaml
    - assert:
        file: 03-assert-install-tempo-monolithic.yaml
  - name: Install OTelCol for TempoStack
    try:
    - apply:
        file: 04-install-otelcol-tempostack.yaml
    - assert:
        file: 04-assert-install-otelcol-tempostack.yaml
  - name: Install OTelCol for TempoMonolithic
    try:
    - apply:
        file: 05-install-otelcol-tempomonolithic.yaml
    - assert:
        file: 05-assert-install-otelcol-tempomonolithic.yaml
  - name: Create SAs with namespace level access for TempoStack 
    try:
    - apply:
        file: 06-create-SAs-with-namespace-access-tempostack.yaml
    - assert:
        file: 06-assert-create-SAs-with-namespace-access-tempostack.yaml
  - name: Create non-admin SAs with namespace level access for TempoMonolithic
    try:
    - apply:
        file: 07-create-SAs-with-namespace-access-tempomonolithic.yaml
    - assert:
        file: 07-assert-create-SAs-with-namespace-access-tempomonolithic.yaml
  - name: Generate traces from namespace chainsaw-test-rbac-1 for TempoStack
    try:
    - apply:
        file: 08-tempostack-rbac-sa-1-traces-gen.yaml
    - assert:
        file: 08-assert-tempostack-rbac-sa-1-traces-gen.yaml
    - delete:
        file: 08-tempostack-rbac-sa-1-traces-gen.yaml
  - name: Generate traces from namespace chainsaw-mono-rbac-1 for TempoMonolithic
    try:
    - apply:
        file: 09-tempo-mono-rbac-sa-1-traces-gen.yaml
    - assert:
        file: 09-assert-tempo-mono-rbac-sa-1-traces-gen.yaml
    - delete:
        file: 09-tempo-mono-rbac-sa-1-traces-gen.yaml
  - name: Generate traces from namespace chainsaw-test-rbac-2 for TempoStack
    try:
    - apply:
        file: 10-tempostack-rbac-sa-2-traces-gen.yaml
    - assert:
        file: 10-assert-tempostack-rbac-sa-2-traces-gen.yaml
    - delete:
        file: 10-tempostack-rbac-sa-2-traces-gen.yaml
  - name: Generate traces from namespace chainsaw-mono-rbac-2 for TempoMonolithic
    try:
    - apply:
        file: 11-tempo-mono-rbac-sa-2-traces-gen.yaml
    - assert:
        file: 11-assert-tempo-mono-rbac-sa-2-traces-gen.yaml
    - delete:
        file: 11-tempo-mono-rbac-sa-2-traces-gen.yaml
  - name: Verify tracess using RBAC for TempoStack
    try:
    - apply:
        file: 12-tempostack-rbac-sa-1-traces-verify.yaml
    - assert:
        file: 12-assert-tempostack-rbac-sa-1-traces-verify.yaml
    - delete:
        file: 12-tempostack-rbac-sa-1-traces-verify.yaml
  - name: Verify tracess using RBAC for TempoMonolithic
    try:
    - apply:
        file: 13-tempo-mono-rbac-sa-1-traces-verify.yaml
    - assert:
        file: 13-assert-tempo-mono-rbac-sa-1-traces-verify.yaml
    - delete:
        file: 13-tempo-mono-rbac-sa-1-traces-verify.yaml
  - name: Verify kubeadmin can view traces from all projects for TempoStack
    try:
    - apply:
        file: 14-kubeadmin-tempostack-traces-verify.yaml
    - assert:
        file: 14-assert-kubeadmin-tempostack-traces-verify.yaml
    - delete:
        file: 14-kubeadmin-tempostack-traces-verify.yaml
  - name: Verify kubeadmin can view traces from all projects for TempoMonolithic
    try:
    - apply:
        file: 15-kubeadmin-tempo-mono-traces-verify.yaml
    - assert:
        file: 15-assert-kubeadmin-tempo-mono-traces-verify.yaml
    - delete:
        file: 15-kubeadmin-tempo-mono-traces-verify.yaml
  - name: Create upgrade catalog for Tempo Operator
    try:
    - apply:
        file: 16-create-upgrade-catalog.yaml
        expect:
        - check:
            # Allow success or forbidden error
            ($error == null || contains($error, 'forbidden')): true
    - assert:
        file: 16-assert-upgrade-catalog.yaml
  - name: Upgrade Tempo Operator
    try:
    - apply:
        file: 17-upgrade-operator.yaml
    - assert:
        file: 17-assert-upgrade.yaml
    catch:
    - podLogs:
        namespace: openshift-tempo-operator
        selector: app.kubernetes.io/name=tempo-operator
        tail: 100
    finally:
    - get:
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        namespace: openshift-tempo-operator
        name: tempo-product
        format: yaml
  - name: Wait for the upgrade to complete specifically when upgrading to a minor version when the operator and operand version doesn't change.
    try:
      - sleep:
          duration: 120s
  - name: Assert TempoStack is ready
    try:
    - assert:
        resource:
          apiVersion: tempo.grafana.com/v1alpha1
          kind: TempoStack
          metadata:
            name: simplst
            namespace: chainsaw-rbac
          status:
            operatorVersion: ($upgrade_operator_version)
            tempoVersion: ($upgrade_tempo_version)
            (conditions[?type == 'Ready']):
            - status: 'True'
    finally:
    - get:
        apiVersion: apps/v1
        kind: Deployment
        namespace: chainsaw-rbac
        format: yaml
    - get:
        apiVersion: apps/v1
        kind: StatefulSet
        namespace: chainsaw-rbac
        format: yaml
  - name: Assert TempoMonolithic is ready
    try:
    - assert:
        resource:
          apiVersion: tempo.grafana.com/v1alpha1
          kind: TempoMonolithic
          metadata:
            name: mmo-rbac
            namespace: chainsaw-mmo-rbac
          status:
            operatorVersion: ($upgrade_operator_version)
            tempoVersion: ($upgrade_tempo_version)
            (conditions[?type == 'Ready']):
            - status: 'True'
    finally:
    - get:
        apiVersion: apps/v1
        kind: Deployment
        namespace: chainsaw-mmo-rbac
        format: yaml
    - get:
        apiVersion: apps/v1
        kind: StatefulSet
        namespace: chainsaw-mmo-rbac
        format: yaml
  - name: Assert operator NetworkPolicies post-upgrade
    try:
    - assert:
        file: 21-assert-upgrade-operator-networkpolicies.yaml
  - name: Assert operand NetworkPolicies post-upgrade
    try:
    - assert:
        file: 22-assert-upgrade-operand-networkpolicies.yaml
  - name: Generate traces from namespace chainsaw-mono-rbac-1 for TempoMonolithic after upgrade
    try:
    - create:
        file: 09-tempo-mono-rbac-sa-1-traces-gen.yaml
    - assert:
        file: 09-assert-tempo-mono-rbac-sa-1-traces-gen.yaml
  - name: Generate traces from namespace chainsaw-mono-rbac-2 for TempoMonolithic after upgrade
    try:
    - create:
        file: 11-tempo-mono-rbac-sa-2-traces-gen.yaml
    - assert:
        file: 11-assert-tempo-mono-rbac-sa-2-traces-gen.yaml
  - name: Verify tracess using RBAC for TempoStack after upgrade
    try:
    - create:
        file: 12-tempostack-rbac-sa-1-traces-verify.yaml
    - assert:
        file: 12-assert-tempostack-rbac-sa-1-traces-verify.yaml
  - name: Verify tracess using RBAC for TempoMonolithic after upgrade
    try:
    - create:
        file: 13-tempo-mono-rbac-sa-1-traces-verify.yaml
    - assert:
        file: 13-assert-tempo-mono-rbac-sa-1-traces-verify.yaml
  - name: Verify kubeadmin can view traces from all projects for TempoStack after upgrade
    try:
    - create:
        file: 14-kubeadmin-tempostack-traces-verify.yaml
    - assert:
        file: 14-assert-kubeadmin-tempostack-traces-verify.yaml
  - name: Verify kubeadmin can view traces from all projects for TempoMonolithic after upgrade
    try:
    - create:
        file: 15-kubeadmin-tempo-mono-traces-verify.yaml
    - assert:
        file: 15-assert-kubeadmin-tempo-mono-traces-verify.yaml
