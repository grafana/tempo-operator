apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ossm-tempostack-otel
spec:
  # Avoid running this test case in parallel as it uses high resources and uses static namespaces. 
  concurrent: false
  steps:
  - name: Install OSSM
    try:
    - apply:
        file: 00-install-ossm.yaml
    - assert:
        file: 00-install-ossm-assert.yaml
  - name: Install Minio object store
    try:
    - apply:
        file: 01-install-minio.yaml
    - assert:
        file: 01-install-minio-assert.yaml
  - name: Install TempoStack
    try:
    - apply:
        file: 02-install-tempo.yaml
    - assert:
        file: 02-install-tempo-assert.yaml
  - name: Update Kiali config
    try:
    - patch:
        file: 03-update-kiali.yaml
    - sleep:
        duration: 10s
    - assert:
        file: 03-update-kiali-assert.yaml
  - name: Install OTEL collector
    try:
    - apply: 
        file: 04-install-otel-collector.yaml
    - assert:
        file: 04-install-otel-collector-assert.yaml
  - name: Enable OSSM Tempo provider
    try:
    - apply:
        file: 05-apply-telemetry-cr.yaml
    - sleep:
        duration: 10s
    - assert:
        file: 05-apply-telemetry-cr-assert.yaml
  - name: Install Bookinfo app
    try:
    - apply:
        file: 06-install-bookinfo.yaml
    - assert:
        file: 06-install-bookinfo-assert.yaml
  - name: Generate traces from the bookinfo app
    try:
    - script:
        content: |
            for i in {1..20}
            do
                curl http://$(oc -n istio-system get route istio-ingressgateway -o jsonpath='{.spec.host}')/productpage
                sleep 1
            done
  - name: Check traces in Kiali
    try:
    - apply:
        file: 08-verify-traces.yaml
    - assert:
        timeout: 10m
        file: 08-verify-traces-assert.yaml
  - name: Generate traces and send it to OTEL collector via OTLP GRPC and HTTP
    try:
    - apply:
        file: 09-generate-traces-otel.yaml
    - assert:
        file: 09-generate-traces-otel-assert.yaml
  - name: Verify the traces sent to OTEL collector in TempoStack instance.
    try:
    - apply: 
        file: 10-verify-traces-otel.yaml
    - assert:
        file: 10-verify-traces-otel-assert.yaml