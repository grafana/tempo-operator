apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: multitenancy-rbac
spec:
  namespace: chainsaw-rbac
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install-storage.yaml
    - assert:
        file: 00-assert.yaml
  - name: step-01
    try:
    - apply:
        file: 01-install-tempo.yaml
    - assert:
        file: 01-assert.yaml
  - name: step-02
    try:
    - apply:
        file: 02-install-otelcol.yaml
    - assert:
        file: 02-assert.yaml
  - name: Create non-admin SAs with namespace level access
    try:
    - apply:
        file: 03-create-SAs-with-namespace-access.yaml
    - assert:
        file: 03-assert-create-sas.yaml
  - name: Generate traces from namespace chainsaw-test-rbac-1
    try:
    - apply:
        file: 04-tempo-rbac-sa-1-traces-gen.yaml
    - assert:
        file: 04-assert-tempo-rbac-sa-1-traces-gen.yaml
  - name: Generate traces from namespace chainsaw-test-rbac-2
    try:
    - apply:
        file: 05-tempo-rbac-sa-2-traces-gen.yaml
    - assert:
        file: 05-assert-tempo-rbac-sa-2-traces-gen.yaml
  - name: Assert tracess using RBAC
    try:
    - apply:
        file: 06-tempo-rbac-sa-1-traces-verify.yaml
    - assert:
        file: 06-assert-tempo-rbac-sa-1-traces-verify.yaml
    catch:
    - podLogs:
        selector: job-name=verify-traces-traceql-grpc-sa-1
        namespace: chainsaw-test-rbac-1
        tail: 50
    - podLogs:
        selector: job-name=verify-traces-traceql-http-sa-1
        namespace: chainsaw-test-rbac-1
        tail: 50
  - name: Verify kubeadmin can view traces from all projects
    try:
    - apply:
        file: 07-kubeadmin-traces-verify.yaml
    - assert:
        file: 07-assert-kubeadmin-traces-verify.yaml