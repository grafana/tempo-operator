# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tempo-single-tenant-auth
spec:
  namespace: chainsaw-tst
  steps:
  - name: Install Minio for object store
    try:
    - apply:
        file: 00-install-storage.yaml
    - assert:
        file: 00-install-storage-assert.yaml
  - name: Create TempoStack instance
    try:
    - apply:
        file: 01-install-tempo.yaml
    - assert:
        file: 01-install-tempo-assert.yaml
  - name: Generate traces
    try:
    - apply:
        file: 02-generate-traces.yaml
    - assert:
        file: 02-generate-traces-assert.yaml
  - name: Verify traces using Jaeger UI
    try:
    - apply:
        file: 03-verify-traces-jaeger.yaml
    - assert:
        file: 03-verify-traces-jaeger-assert.yaml
  - name: Verify traces from TraceQL
    try:
    - apply:
        file: 04-verify-traces-traceql.yaml
    - assert:
        file: 04-verify-traces-traceql-assert.yaml
