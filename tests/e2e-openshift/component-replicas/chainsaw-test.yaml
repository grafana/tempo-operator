apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: component-replicas
spec:
  description: Test the scale-up/scale-down of TempoStack component replicas
  namespace: chainsaw-replicas
  steps:
  - name: Create Minio storage instance
    try:
    - apply:
        file: 00-install-storage.yaml
    - assert:
        file: 00-install-storage-assert.yaml
  - name: Create TempoStack instance
    try:
    - apply:
        file: 01-install-tempo.yaml
    - assert:
        file: 01-install-tempo-assert.yaml
  - name: Scale TempoStack components replicas to 2
    bindings:
    - name: tempo_replicas
      value: 2
    try:
    - apply:
        file: 02-scale-tempo.yaml
    - assert:
        file: 02-scale-tempo-assert.yaml
  - name: Install OTEL collector
    try:
    - apply:
        file: 03-install-otelcol.yaml
    - assert:
        file: 03-install-otelcol-assert.yaml
  - name: Generate traces
    try:
    - apply:
        file: 04-generate-traces.yaml
    - assert:
        file: 04-generate-traces-assert.yaml
  - name: Verify traces
    try:
    - apply:
        file: 05-verify-traces.yaml
    - assert:
        file: 05-verify-traces-assert.yaml
  - name: Scale down the TempoStack component replicas to 1
    bindings:
    - name: tempo_replicas
      value: 1
    try:
    - apply:
        file: 02-scale-tempo.yaml
    - assert:
        file: 02-scale-tempo-assert.yaml
