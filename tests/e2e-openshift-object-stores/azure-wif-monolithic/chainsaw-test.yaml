apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: azure-wif-monolithic
  labels:
    type: azure-wif
spec:
  description: Test TempoStack support for Azure WIF using STS.
  namespace: chainsaw-azurewif-mono
  steps:
  - name: Create Azure WIF bucket
    try:
    - script:
        timeout: 10m
        content: ./azure-wif-create.sh
    - assert:
        file: 00-azure-wif-create-assert.yaml
  - name: Install Tempo Monolithic
    try:
    - apply:
        file: 01-install-monolithic.yaml
    - assert:
        file: 01-install-monolithic-assert.yaml
  - name: Wait for the TempoStack to be ready
    try:
    - script:
        timeout: 5m
        content: oc get --namespace chainsaw-azurewif-mono tempomonolithic azurewifmn -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep True
  - name: Generate traces
    try:
    - apply:
        file: 03-generate-traces.yaml
    - assert:
        file: 03-generate-traces-assert.yaml
  - name: Verify traces
    try:
    - apply:
        file: 04-verify-traces.yaml
    - assert:
        file: 04-verify-traces-assert.yaml
  - name: Delete resource group
    try:
    - script:
        timeout: 5m
        content: ./azure-wif-delete.sh