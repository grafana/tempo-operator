apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gcp-wif-tempostack
  labels:
    type: gcp-wif
spec:
  description: Test TempoStack support for GCP WIF using STS.
  namespace: chainsaw-gcpwif-tempo
  steps:
  - name: Create GCP WIF bucket
    try:
    - script:
        timeout: 2m
        content: ./gcp-wif-create.sh gcpwiftm
    - assert:
        file: 00-gcp-wif-create-assert.yaml
  - name: Install TempoStack
    try:
    - apply:
        file: 01-install-tempostack.yaml
    - assert:
        file: 01-install-tempostack-assert.yaml
  - name: Wait for the TempoStack to be ready
    try:
    - script:
        timeout: 5m
        content: oc get --namespace chainsaw-gcpwif-tempo tempo gcpwiftm -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep True
  - name: Generate traces
    try:
    - apply:
        file: 03-generate-traces.yaml
    - assert:
        file: 03-generate-traces-assert.yaml
  - name: Verify traces
    try:
    - apply:
        file: 04-verify-traces.yaml
    - assert:
        file: 04-verify-traces-assert.yaml
    cleanup:
    - script:
        timeout: 2m
        content: ./gcp-wif-delete.sh
