apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: simplest
  namespace: chainsaw-tls-profile-gw-ovr
spec:
  storage:
    secret:
      name: minio
      type: s3
    tls:
      enabled: true
      caName: custom-ca
      minVersion: "VersionTLS13"
  storageSize: 1Gi
  resources:
    total:
      limits:
        memory: 3Gi
        cpu: 2000m
  tenants:
    mode: openshift
    authentication:
      - tenantName: dev
        tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"
      - tenantName: prod
        tenantId: "1610b0c3-c509-4592-a256-a1871353dbfb"
  networkPolicy:
    enabled: false
  template:
    gateway:
      enabled: true
    queryFrontend:
      jaegerQuery:
        enabled: true
