apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: mono
  namespace: chainsaw-tls-profile-mono
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo-mono
  namespace: chainsaw-tls-profile-mono
status:
  readyReplicas: 1
---
apiVersion: v1
kind: Pod
metadata:
  name: tempo-mono-0
  namespace: chainsaw-tls-profile-mono
status:
  containerStatuses:
  - name: jaeger-query
    ready: true
    started: true
  - name: tempo
    ready: true
    started: true
  - name: tempo-gateway
    ready: true
    started: true
  - name: tempo-gateway-opa
    ready: true
    started: true
  - name: tempo-query
    ready: true
    started: true
  phase: Running
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-mono-gateway
  namespace: chainsaw-tls-profile-mono
