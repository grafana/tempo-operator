apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: mono
  namespace: chainsaw-tls-profile-mono
spec:
  storage:
    traces:
      backend: s3
      size: 1Gi
      s3:
        secret: minio
        tls:
          enabled: true
          caName: custom-ca
          minVersion: "1.3"
  jaegerui:
    enabled: true
  multitenancy:
    enabled: true
    mode: openshift
    authentication:
    - tenantName: dev
      tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"
  ingestion:
    otlp:
      grpc:
        tls:
          enabled: true
          minVersion: "1.3"
      http:
        tls:
          enabled: true
          minVersion: "1.3"
