# 1x.small: larger production workloads (~500GB/day) with HA support.
# We only check spec configuration, not pod readiness, to allow running
# on resource-constrained clusters.
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: small
spec:
  replicationFactor: 2
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo-small-ingester
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: tempo
          resources:
            requests:
              cpu: "2"
              memory: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-small-distributor
spec:
  template:
    spec:
      containers:
        - name: tempo
          resources:
            requests:
              cpu: 600m
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-small-querier
spec:
  template:
    spec:
      containers:
        - name: tempo
          resources:
            requests:
              cpu: 2500m
              memory: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-small-query-frontend
spec:
  template:
    spec:
      containers:
        - name: tempo
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
        - name: jaeger-query
          resources:
            requests:
              cpu: 800m
              memory: 192Mi
        - name: tempo-query
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-small-compactor
spec:
  template:
    spec:
      containers:
        - name: tempo
          resources:
            requests:
              cpu: 400m
              memory: 6Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-small-gateway
spec:
  template:
    spec:
      containers:
        - name: tempo-gateway
          resources:
            requests:
              cpu: 800m
              memory: 192Mi
        - name: tempo-gateway-opa
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
