apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-simplest-compactor
status:
  readyReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-simplest-distributor
status:
  readyReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-simplest-querier
status:
  readyReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-simplest-query-frontend
status:
  readyReplicas: 1
---
# Verify the ingester has the ocp-ca-bundle ConfigMap mounted at the storage CA dir.
# This confirms the operator correctly resolved ca-bundle.crt as the CA key.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo-simplest-ingester
spec:
  template:
    spec:
      containers:
      - volumeMounts:
        - mountPath: /conf
          name: tempo-conf
          readOnly: true
        - mountPath: /var/tempo
          name: data
        - mountPath: /var/run/tls/storage/ca
          name: ocp-ca-bundle
          readOnly: true
        - mountPath: /var/run/ca
          name: tempo-simplest-ca-bundle
        - mountPath: /var/run/tls/server
          name: tempo-simplest-ingester-mtls
      volumes:
      - configMap:
          defaultMode: 420
          name: tempo-simplest
        name: tempo-conf
      - configMap:
          defaultMode: 420
          name: ocp-ca-bundle
        name: ocp-ca-bundle
      - configMap:
          defaultMode: 420
          name: tempo-simplest-ca-bundle
        name: tempo-simplest-ca-bundle
      - name: tempo-simplest-ingester-mtls
        secret:
          defaultMode: 420
          secretName: tempo-simplest-ingester-mtls
status:
  readyReplicas: 1
