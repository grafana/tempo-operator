apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: simplest
spec:
  env:
    - name: TEST_DIRECT_ENV
      value: "direct-value"
    - name: TEST_SECRET_ENV
      valueFrom:
        secretKeyRef:
          name: test-env-secret
          key: SECRET_PASSWORD
  envFrom:
    - secretRef:
        name: test-env-secret
  extraConfig:
    tempo:
      querier:
        search:
          query_timeout: 180s
      query_frontend:
        max_retries: 3
  jaegerui:
    enabled: true
