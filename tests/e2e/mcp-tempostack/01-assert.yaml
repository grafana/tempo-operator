    app.kubernetes.io/instance: simplest
    app.kubernetes.io/managed-by: tempo-operator
    app.kubernetes.io/name: tempo
  name: tempo-simplest-query-frontend
spec:
  ports:
    - name: http
      port: 3200
      protocol: TCP
      targetPort: http
    - name: grpc
      port: 9095
      protocol: TCP
      targetPort: grpc
    - name: jaeger-grpc
      port: 16685
      protocol: TCP
      targetPort: jaeger-grpc
    - name: jaeger-ui
      port: 16686
      protocol: TCP
      targetPort: jaeger-ui
    - name: jaeger-metrics
      port: 16687
      protocol: TCP
      targetPort: jaeger-metrics
  selector:
